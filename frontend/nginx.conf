server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 12m;

    # ─── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml font/woff font/woff2;

    # ─── Headers de sécurité HTTP ─────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options    "nosniff"                          always;
    add_header X-XSS-Protection          "1; mode=block"                    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ─── Vue Router (SPA fallback) ────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Proxy API vers le backend Spring Boot ────────────────────────────────
    location ^~ /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ─── Proxy WebSocket STOMP ────────────────────────────────────────────────
    location /ws {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── Fichiers uploadés ────────────────────────────────────────────────────
    location ^~ /uploads/ {
        proxy_pass       http://backend:8080/uploads/;
        proxy_set_header Host $host;
    }

    # ─── Cache des assets statiques (Vite génère des noms avec hash) ─────────
    location ~* \.(js|css|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ─── Bloquer l'accès aux fichiers cachés (.env, .git, etc.) ──────────────
    location ~ /\. {
        deny all;
        access_log  off;
        log_not_found off;
    }
}
