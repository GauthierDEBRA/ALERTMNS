services:

  # ─── Base de données MySQL ───────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: alertmns-db
    restart: unless-stopped
    environment:
      TZ: Europe/Paris
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-alertmns}
      MYSQL_USER: ${MYSQL_USER:-alertmns}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-alertmns}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./alertmns_db.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "${MYSQL_USER:-alertmns}", "-p${MYSQL_PASSWORD:-alertmns}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Backend Spring Boot ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alertmns-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      TZ: Europe/Paris
      JAVA_TOOL_OPTIONS: -Duser.timezone=Europe/Paris
      JWT_SECRET: ${JWT_SECRET}
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-alertmns}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Paris
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-alertmns}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-alertmns}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-mailpit}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-1025}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-false}
      SPRING_MAIL_SMTP_STARTTLS: ${SPRING_MAIL_SMTP_STARTTLS:-false}
      ALERTMNS_MAIL_ENABLED: ${ALERTMNS_MAIL_ENABLED:-true}
      ALERTMNS_MAIL_FROM: ${ALERTMNS_MAIL_FROM:-no-reply@alertmns.local}
      ALERTMNS_MAIL_FROM_NAME: ${ALERTMNS_MAIL_FROM_NAME:-ALERTMNS}
      ALERTMNS_APP_BASE_URL: ${ALERTMNS_APP_BASE_URL:-http://localhost}
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ─── Frontend Vue.js (Nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alertmns-frontend
    restart: unless-stopped
    environment:
      TZ: Europe/Paris
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

  # ─── Adminer (interface web MySQL) ───────────────────────────────────────────
  adminer:
    image: adminer:4
    container_name: alertmns-adminer
    restart: unless-stopped
    environment:
      TZ: Europe/Paris
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8080"

  # ─── Mailpit (SMTP dev + interface web) ─────────────────────────────────────
  mailpit:
    image: axllent/mailpit:v1.21
    container_name: alertmns-mailpit
    restart: unless-stopped
    environment:
      TZ: Europe/Paris
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  db_data:
  uploads:
