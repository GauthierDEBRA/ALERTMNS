version: '3.9'

services:

  # ─── Base de données MySQL ───────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: alertmns-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: alertmns
      MYSQL_USER: alertmns
      MYSQL_PASSWORD: alertmns
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./alertmns_db.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "alertmns", "-palertmns"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Backend Spring Boot ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alertmns-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/alertmns?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Paris
      SPRING_DATASOURCE_USERNAME: alertmns
      SPRING_DATASOURCE_PASSWORD: alertmns
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads

  # ─── Frontend Vue.js (Nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alertmns-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db_data:
  uploads:
