spring.datasource.url=jdbc:mysql://db:3306/alertmns?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Paris
spring.datasource.username=alertmns
spring.datasource.password=alertmns
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Europe/Paris
spring.jackson.time-zone=Europe/Paris
jwt.secret=${JWT_SECRET:}
jwt.expiration=86400000
jwt.refresh-expiration=2592000000
jwt.refresh-cookie-name=alertmns_refresh_token
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=/app/uploads
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS:false}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
alertmns.mail.enabled=${ALERTMNS_MAIL_ENABLED:false}
alertmns.mail.from=${ALERTMNS_MAIL_FROM:no-reply@alertmns.local}
alertmns.mail.from-name=${ALERTMNS_MAIL_FROM_NAME:ALERTMNS}
alertmns.app-base-url=${ALERTMNS_APP_BASE_URL:http://localhost}
server.use-secure-cookie=${USE_SECURE_COOKIE:false}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:80,http://localhost}
